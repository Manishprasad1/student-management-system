<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; }
        th, td { border: 1px solid #ccc; padding: 0.5rem 1rem; text-align: left; }
        th { background: #f5f5f5; }
        .empty { color: #666; }
        .grade-form { display: flex; gap: 0.5rem; align-items: center; }
        .grade-form input { padding: 0.25rem 0.5rem; }
    </style>
</head>
<body>
    <h1>Students</h1>
    <p><a href="{{ url_for('new_student_form') }}">Add Student</a></p>
    {% if students %}
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Roll No</th>
                <th>Grade</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.roll_no }}</td>
                <td>
                    <form class="grade-form" method="post" action="{{ url_for('update_grade', student_id=student.id) }}">
                        <input type="text" name="grade" value="{{ student.grade }}" required>
                        <button type="submit">Update</button>
                    </form>
                </td>
                <td>
                    <form method="post" action="{{ url_for('delete_student_route', student_id=student.id) }}" onsubmit="return confirm('Delete {{ student.name }}?');">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p class="empty">No students found.</p>
    {% endif %}
</body>
</html>
